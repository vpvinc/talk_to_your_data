name: user_revenue_summary
source:
  type: postgres
  connection:
    host: dpg-d35pib0dl3ps7394mc4g-a.oregon-postgres.render.com
    port: 5432
    database: beam_neb0
    user: students
    password: AIWorkflowsBootcamp
  table: user_revenue_summary
description: 'Per-user revenue summary with lifetime value and most recent subscription
  plan. Use for revenue aggregations: top customers, total revenue by country or plan.
  Do not join users and payments manually for these questions.'
columns:
- name: user_id
  type: integer
  description: Unique identifier for the user.
- name: country
  type: string
  description: User country at signup.
- name: signup_date
  type: datetime
  description: Date the user signed up.
- name: plan
  type: string
  description: 'Most recent subscription plan. Values: free, monthly, annual.'
- name: total_payments
  type: integer
  description: Total number of payments made by the user.
- name: total_revenue_usd
  type: float
  description: Total revenue generated by the user in USD.
- name: last_payment_date
  type: datetime
  description: Most recent payment date for the user.
