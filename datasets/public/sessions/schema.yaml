name: sessions
source:
  type: postgres
  connection:
    host: dpg-d35pib0dl3ps7394mc4g-a.oregon-postgres.render.com
    port: 5432
    database: beam_neb0
    user: students
    password: AIWorkflowsBootcamp
  table: sessions
description: "User activity sessions \u2014 one row per session with duration and\
  \ activity type. Use for individual session-level questions. For DAU/WAU/MAU use\
  \ user_activity_metrics instead."
columns:
- name: session_id
  type: integer
  description: Unique identifier for the session.
- name: user_id
  type: integer
  description: Foreign key linking to the users table.
- name: session_date
  type: datetime
  description: Date and time when the session occurred.
- name: duration_minutes
  type: integer
  description: Duration of the session in minutes.
- name: activity_type
  type: string
  description: 'Main activity during the session. Values: browse, listen, read.'
