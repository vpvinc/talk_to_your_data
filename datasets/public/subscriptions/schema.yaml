name: subscriptions
source:
  type: postgres
  connection:
    host: dpg-d35pib0dl3ps7394mc4g-a.oregon-postgres.render.com
    port: 5432
    database: beam_neb0
    user: students
    password: AIWorkflowsBootcamp
  table: subscriptions
description: 'User subscription records including plan, status, and lifecycle dates.
  Use for subscription lifecycle questions: churn, plan distribution, active vs expired
  counts.'
columns:
- name: subscription_id
  type: integer
  description: Unique identifier for the subscription.
- name: user_id
  type: integer
  description: Foreign key linking to the users table.
- name: plan
  type: string
  description: 'Subscription plan. Values: free, monthly, annual.'
- name: start_date
  type: datetime
  description: Date when the subscription started.
- name: end_date
  type: datetime
  description: Date when the subscription ended. Null for currently active subscriptions.
- name: status
  type: string
  description: 'Current subscription status. Values: active, canceled, expired.'
